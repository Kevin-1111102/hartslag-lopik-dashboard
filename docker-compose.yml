services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hartslag_app
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www/html
    environment:
      # Laravel
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000

      # Database
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: hartslag
      DB_USERNAME: hartslag
      DB_PASSWORD: hartslag

    depends_on:
      - db

    # Wait a moment for DB, then run migrations+seed and start dev server
    command: >
      sh -c "php artisan migrate --force --no-interaction && php artisan db:seed --force --no-interaction && php artisan serve --host=0.0.0.0 --port=8000"

  db:
    image: mysql:8.0
    container_name: hartslag_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hartslag
      MYSQL_USER: hartslag
      MYSQL_PASSWORD: hartslag
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: hartslag_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

volumes:
  db_data:

